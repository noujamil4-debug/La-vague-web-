<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vague - Dashboard Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a1128; --gold: #c5a059; --white: #ffffff; }
        body { background: var(--navy); color: var(--white); font-family: 'Poppins', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        
        .ticket { background: var(--white); color: var(--navy); border-radius: 15px; padding: 25px; margin-bottom: 25px; border-left: 10px solid var(--gold); position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.5); animation: slide 0.4s; }
        @keyframes slide { from { transform: translateX(100px); opacity:0; } to { transform: translateX(0); opacity:1; } }
        
        .del-icon { position: absolute; top: 15px; left: 15px; color: #ff4444; cursor: pointer; font-size: 1.2rem; }
        .btn-gps { display: block; background: #0051ff; color: #fff; text-decoration: none; text-align: center; padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: 800; }
        .btn-done { width: 100%; background: #28a745; color: #fff; border: none; padding: 18px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; cursor: pointer; }
        
        #owner-sec { display: none; background: #111b33; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 30px; text-align: center; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; color: var(--gold); cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="this.style.display='none'; document.getElementById('bell').play();"><h1>ACTIVER LE SYSTÈME 🔔</h1></div>

    <div class="header">
        <h1 style="font-family: 'Playfair Display'; color: var(--gold);">STAFF PANEL</h1>
        <button onclick="openOwner()" style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:8px 15px; border-radius:5px; font-weight:bold;">OWNER 👑</button>
    </div>

    <div id="owner-sec">
        <h2 style="color:var(--gold)">Bénéfices du Mois</h2>
        <h1 id="profit-val" style="font-size:3rem; margin:15px 0;">0 DA</h1>
        <button onclick="document.getElementById('owner-sec').style.display='none'" style="color:red; background:none; border:none;">FERMER</button>
    </div>

    <audio id="bell"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <div id="orders-list"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDc3TEyLFxWUl_XmF0m_lS_v6eG_v0", authDomain: "la-vague-b1984.firebaseapp.com", databaseURL: "https://la-vague-b1984-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "la-vague-b1984" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        const bell = document.getElementById('bell');

        db.ref('orders').on('child_added', snap => {
            const v = snap.val();
            let r = 0; const ring = setInterval(() => { bell.currentTime=0; bell.play(); r++; if(r>=3) clearInterval(ring); }, 1300);

            const html = `
                <div class="ticket" id="${snap.key}">
                    <i class="fas fa-trash del-icon" onclick="delOrder('${snap.key}')"></i>
                    <h2 style="margin:0">Client: ${v.name}</h2>
                    <p style="font-size:1.4rem; color:var(--gold); font-weight:800; margin:10px 0;">📞 ${v.phone}</p>
                    <p>📍 Commune: ${v.commune}</p>
                    <div style="background:#f4f4f4; padding:15px; border-radius:10px; margin:15px 0;"><b>Commande:</b><br>${v.items}</div>
                    <h1 style="color:var(--gold); font-weight:900;">${v.total} DA</h1>
                    <a href="https://www.google.com/maps?q=${v.gps}" target="_blank" class="btn-gps">GPS CLIENT 📍</a>
                    <button class="btn-done" onclick="complete('${snap.key}', ${v.total})">PRÊT ✓</button>
                </div>`;
            document.getElementById('orders-list').insertAdjacentHTML('afterbegin', html);
        });

        function complete(id, amt) {
            db.ref('profits').push({amount: amt}).then(() => { db.ref('orders/'+id).remove(); document.getElementById(id).remove(); });
        }

        function delOrder(id) { if(confirm("Supprimer?")) { db.ref('orders/'+id).remove(); document.getElementById(id).remove(); } }

        function openOwner() {
            if(prompt("CODE:") === "0000") {
                document.getElementById('owner-sec').style.display='block';
                db.ref('profits').once('value', s => {
                    let t=0; s.forEach(c => t += c.val().amount);
                    document.getElementById('profit-val').innerText = t + " DA";
                });
            }
        }
    </script>
</body>
</html>
